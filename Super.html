<!DOCTYPE html>
<html>
<head>
<title>Advanced HTML FPS</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
}

#menu{
position:absolute;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#menu button{
padding:15px 40px;
font-size:20px;
cursor:pointer;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:18px;
}

#crosshair{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:30px;
pointer-events:none;
}

#gameover{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
color:white;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
}

</style>
</head>

<body>

<div id="menu">
<h1>FPS GAME</h1>
<button onclick="startGame()">Start Game</button>
<p>WASD Move | Click Shoot | Shift Sprint</p>
</div>

<div id="gameover">
<h1 id="finalScore"></h1>
<button onclick="location.reload()">Restart</button>
</div>

<div id="crosshair">+</div>

<div id="ui">
Health: <span id="health">100</span><br>
Score: <span id="score">0</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let scene,camera,renderer;
let bots=[];
let bullets=[];
let botBullets=[];
let keys={};

let health=100;
let score=0;

let started=false;

function startGame(){

document.getElementById("menu").style.display="none";

init();
animate();

document.body.requestPointerLock();

started=true;

}

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.y=1.7;

renderer=new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,.4));

let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

/* FLOOR */

let floor=new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshLambertMaterial({color:0x444444})
);

floor.rotation.x=-Math.PI/2;

scene.add(floor);

/* WALLS */

for(let i=0;i<20;i++){

let wall=new THREE.Mesh(
new THREE.BoxGeometry(5,3,1),
new THREE.MeshLambertMaterial({color:0x666666})
);

wall.position.set(
Math.random()*80-40,
1.5,
Math.random()*80-40
);

scene.add(wall);

}

/* GUN */

let gun=new THREE.Mesh(
new THREE.BoxGeometry(.3,.2,1),
new THREE.MeshLambertMaterial({color:0x555555})
);

gun.position.set(.5,-.4,-1);

camera.add(gun);

scene.add(camera);

/* BOTS */

for(let i=0;i<6;i++) spawnBot();

}

/* SPAWN BOT */

function spawnBot(){

let bot=new THREE.Mesh(

new THREE.BoxGeometry(1,2,1),

new THREE.MeshLambertMaterial({color:0xff4444})

);

bot.position.set(

Math.random()*60-30,
1,
Math.random()*60-30

);

bot.cooldown=0;

scene.add(bot);

bots.push(bot);

}

/* INPUT */

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let pitch=0;
let yaw=0;

document.addEventListener("mousemove",e=>{

if(document.pointerLockElement===document.body){

yaw -= e.movementX*0.002;
pitch -= e.movementY*0.002;

pitch=Math.max(-1.5,Math.min(1.5,pitch));

camera.rotation.set(pitch,yaw,0);

}

});

/* SHOOT */

document.addEventListener("mousedown",()=>{

if(!started) return;

let bullet=new THREE.Mesh(

new THREE.SphereGeometry(.1),

new THREE.MeshBasicMaterial({color:0xffff00})

);

bullet.position.copy(camera.position);

bullet.velocity=new THREE.Vector3(0,0,-1)
.applyQuaternion(camera.quaternion)
.multiplyScalar(.8);

scene.add(bullet);

bullets.push(bullet);

});

/* MOVEMENT */

function move(){

let speed = keys["shift"] ? .18 : .1;

if(keys["w"]) camera.translateZ(-speed);
if(keys["s"]) camera.translateZ(speed);
if(keys["a"]) camera.translateX(-speed);
if(keys["d"]) camera.translateX(speed);

}

/* BULLETS */

function updateBullets(){

bullets.forEach((b,i)=>{

b.position.add(b.velocity);

bots.forEach((bot,j)=>{

if(b.position.distanceTo(bot.position)<1){

scene.remove(bot);
bots.splice(j,1);

score++;
document.getElementById("score").textContent=score;

spawnBot();

}

});

});

}

/* BOT AI */

function updateBots(){

bots.forEach(bot=>{

let dir=new THREE.Vector3()
.subVectors(camera.position,bot.position);

let dist=dir.length();

dir.normalize();

bot.position.add(dir.multiplyScalar(.02));

/* SHOOT */

bot.cooldown--;

if(bot.cooldown<=0 && dist<20){

let bullet=new THREE.Mesh(

new THREE.SphereGeometry(.12),

new THREE.MeshBasicMaterial({color:0xff0000})

);

bullet.position.copy(bot.position);

bullet.velocity=dir.clone().multiplyScalar(.25);

scene.add(bullet);

botBullets.push(bullet);

bot.cooldown=120;

}

});

}

/* BOT BULLETS */

function updateBotBullets(){

botBullets.forEach(b=>{

b.position.add(b.velocity);

if(b.position.distanceTo(camera.position)<1){

health-=10;

document.getElementById("health").textContent=health;

scene.remove(b);

if(health<=0) gameOver();

}

});

}

/* GAME OVER */

function gameOver(){

document.exitPointerLock();

document.getElementById("gameover").style.display="flex";

document.getElementById("finalScore").innerText="Score: "+score;

}

/* LOOP */

function animate(){

requestAnimationFrame(animate);

move();
updateBullets();
updateBots();
updateBotBullets();

renderer.render(scene,camera);

}

</script>

</body>
</html>
