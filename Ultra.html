<!DOCTYPE html>
<html>
<head>
<title>HTML FPS With Bots</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#crosshair{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:28px;
color:white;
pointer-events:none;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:18px;
}

#info{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:14px;
}
</style>

</head>

<body>

<div id="crosshair">+</div>

<div id="ui">
Health: <span id="health">100</span><br>
Score: <span id="score">0</span>
</div>

<div id="info">
Click to lock mouse | WASD Move | Click Shoot
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.3));

/* FLOOR */

let floorGeo = new THREE.PlaneGeometry(200,200);
let floorMat = new THREE.MeshLambertMaterial({color:0x333333});
let floor = new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x=-Math.PI/2;
scene.add(floor);

/* PLAYER */

camera.position.y=1.7;

let health=100;
let score=0;

/* GUN */

let gunGeo = new THREE.BoxGeometry(0.3,0.2,1);
let gunMat = new THREE.MeshLambertMaterial({color:0x555555});
let gun = new THREE.Mesh(gunGeo,gunMat);

gun.position.set(0.5,-0.4,-1);
camera.add(gun);
scene.add(camera);

/* BOTS */

let bots=[];

function spawnBot(){

let geo=new THREE.BoxGeometry(1,2,1);
let mat=new THREE.MeshLambertMaterial({color:0xff3333});

let bot=new THREE.Mesh(geo,mat);

bot.position.set(
Math.random()*40-20,
1,
Math.random()*40-20
);

scene.add(bot);
bots.push(bot);

}

for(let i=0;i<8;i++) spawnBot();

/* INPUT */

let keys={};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let pitch=0;
let yaw=0;

document.body.onclick=()=>{
document.body.requestPointerLock();
shoot();
};

document.addEventListener("mousemove",e=>{

if(document.pointerLockElement===document.body){

yaw -= e.movementX*0.002;
pitch -= e.movementY*0.002;

pitch=Math.max(-1.5,Math.min(1.5,pitch));

camera.rotation.set(pitch,yaw,0);

}

});

/* MOVEMENT */

function move(){

let speed = keys["shift"] ? 0.18 : 0.1;

if(keys["w"]) camera.translateZ(-speed);
if(keys["s"]) camera.translateZ(speed);
if(keys["a"]) camera.translateX(-speed);
if(keys["d"]) camera.translateX(speed);

}

/* SHOOT */

let raycaster=new THREE.Raycaster();

function shoot(){

raycaster.setFromCamera(
new THREE.Vector2(0,0),
camera
);

let hit=raycaster.intersectObjects(bots);

if(hit.length>0){

let bot=hit[0].object;

scene.remove(bot);
bots.splice(bots.indexOf(bot),1);

score++;
document.getElementById("score").textContent=score;

spawnBot();

}

}

/* BOT AI */

function updateBots(){

bots.forEach(bot=>{

let dir = new THREE.Vector3();
dir.subVectors(camera.position,bot.position);

let dist=dir.length();

dir.normalize();

bot.position.add(dir.multiplyScalar(0.02));

if(dist<1.5){

health-=0.2;

document.getElementById("health").textContent=Math.floor(health);

if(health<=0){
alert("Game Over! Score: "+score);
location.reload();
}

}

});

}

/* LOOP */

function animate(){

requestAnimationFrame(animate);

move();
updateBots();

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
