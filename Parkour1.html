<!DOCTYPE html>
<html>
<head>
<title>Parkour Game</title>
<style>
body{
    margin:0;
    background:#111;
    overflow:hidden;
}
canvas{
    background:#222;
    display:block;
    margin:auto;
}
</style>
</head>

<body>

<canvas id="game" width="900" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gravity = 0.6;

let player = {
    x:100,
    y:300,
    width:30,
    height:30,
    vx:0,
    vy:0,
    speed:5,
    jump:12,
    grounded:false
};

let keys = {};

let platforms = [
{x:0,y:450,w:900,h:50},
{x:200,y:380,w:120,h:20},
{x:380,y:320,w:120,h:20},
{x:560,y:260,w:120,h:20},
{x:740,y:200,w:120,h:20}
];

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function update(){

    if(keys["a"] || keys["ArrowLeft"]) player.vx = -player.speed;
    else if(keys["d"] || keys["ArrowRight"]) player.vx = player.speed;
    else player.vx = 0;

    if((keys["w"] || keys[" "] || keys["ArrowUp"]) && player.grounded){
        player.vy = -player.jump;
        player.grounded = false;
    }

    player.vy += gravity;

    player.x += player.vx;
    player.y += player.vy;

    player.grounded = false;

    for(let p of platforms){

        if(player.x < p.x + p.w &&
           player.x + player.width > p.x &&
           player.y < p.y + p.h &&
           player.y + player.height > p.y){

            if(player.vy > 0){
                player.y = p.y - player.height;
                player.vy = 0;
                player.grounded = true;
            }
        }
    }

    if(player.y > canvas.height){
        player.x = 100;
        player.y = 300;
        player.vy = 0;
    }
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="lime";
    ctx.fillRect(player.x,player.y,player.width,player.height);

    ctx.fillStyle="white";
    for(let p of platforms){
        ctx.fillRect(p.x,p.y,p.w,p.h);
    }

}

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
