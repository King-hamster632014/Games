<!DOCTYPE html>
<html>
<head>
<title>Simple HTML FPS</title>
<style>
body { margin:0; overflow:hidden; }
#crosshair{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:30px;
color:white;
pointer-events:none;
}
#info{
position:fixed;
top:10px;
left:10px;
color:white;
font-family:Arial;
}
</style>
</head>

<body>

<div id="crosshair">+</div>
<div id="info">Click to lock mouse | WASD Move | Click Shoot</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

let floorGeo = new THREE.PlaneGeometry(100,100);
let floorMat = new THREE.MeshLambertMaterial({color:0x444444});
let floor = new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

let enemies=[];

for(let i=0;i<10;i++){
let g = new THREE.BoxGeometry(1,1,1);
let m = new THREE.MeshLambertMaterial({color:0xff0000});
let e = new THREE.Mesh(g,m);

e.position.set(
Math.random()*20-10,
0.5,
Math.random()*20-10
);

scene.add(e);
enemies.push(e);
}

camera.position.y = 1.6;

let keys = {};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let velocity = new THREE.Vector3();

function move(){

let speed = 0.1;

if(keys["w"]) camera.translateZ(-speed);
if(keys["s"]) camera.translateZ(speed);
if(keys["a"]) camera.translateX(-speed);
if(keys["d"]) camera.translateX(speed);

}

let pitch=0;
let yaw=0;

document.body.addEventListener("click",()=>{
document.body.requestPointerLock();
shoot();
});

document.addEventListener("mousemove",e=>{

if(document.pointerLockElement===document.body){

yaw -= e.movementX*0.002;
pitch -= e.movementY*0.002;

pitch=Math.max(-1.5,Math.min(1.5,pitch));

camera.rotation.set(pitch,yaw,0);

}

});

let raycaster = new THREE.Raycaster();

function shoot(){

raycaster.setFromCamera(
new THREE.Vector2(0,0),
camera
);

let hit = raycaster.intersectObjects(enemies);

if(hit.length>0){

let enemy = hit[0].object;
scene.remove(enemy);

enemies.splice(enemies.indexOf(enemy),1);

}

}

function animate(){

requestAnimationFrame(animate);

move();

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
