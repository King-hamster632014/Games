<!DOCTYPE html>

<html>
<head>
<title>Ultimate Parkour Game</title>
<style>
body{
margin:0;
overflow:hidden;
background:#111;
font-family:Arial;
}

canvas{
display:block;
margin:auto;
background:#1a1a1a;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
} </style>

</head>

<body>

<div id="ui">Coins: 0</div>
<canvas id="game" width="900" height="500"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let gravity = 0.6
let cameraX = 0

let score = 0
let checkpointX = 100

let keys = {}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let player={
x:100,
y:300,
w:30,
h:30,
vx:0,
vy:0,
speed:5,
jump:12,
grounded:false,
wall:false,
doubleJump:true,
dash:false
}

let platforms=[]
let coins=[]
let enemies=[]
let checkpoints=[]
let lava=[]

function generateLevel(){

for(let i=0;i<10;i++){

let x=i*300+200

platforms.push({x:x,y:380,w:120,h:20})
platforms.push({x:x+150,y:320,w:120,h:20})

if(Math.random()>0.5){
platforms.push({
x:x+50,
y:260,
w:120,
h:20,
move:true,
start:x,
end:x+200,
dir:1
})
}

coins.push({x:x+60,y:280,collected:false})

enemies.push({
x:x+100,
y:420,
w:30,
h:30,
dir:1,
start:x+50,
end:x+200
})

checkpoints.push({x:x+250,y:410})

lava.push({x:x+200,y:450,w:100,h:50})

}

platforms.push({x:0,y:450,w:4000,h:50})

}

generateLevel()

function update(){

if(keys["a"]||keys["ArrowLeft"]) player.vx=-player.speed
else if(keys["d"]||keys["ArrowRight"]) player.vx=player.speed
else player.vx=0

if(keys["Shift"] && !player.dash){
player.vx*=4
player.dash=true
setTimeout(()=>player.dash=false,300)
}

if(keys[" "]||keys["w"]||keys["ArrowUp"]){

if(player.grounded){
player.vy=-player.jump
player.doubleJump=true
player.grounded=false
}

else if(player.wall){
player.vy=-player.jump
player.vx*=-1
}

else if(player.doubleJump){
player.vy=-player.jump
player.doubleJump=false
}

}

player.vy+=gravity

if(player.wall && player.vy>3) player.vy=3

player.x+=player.vx
player.y+=player.vy

player.grounded=false
player.wall=false

for(let p of platforms){

if(p.move){
p.x+=p.dir*2
if(p.x<p.start||p.x>p.end) p.dir*=-1
}

if(player.x<p.x+p.w &&
player.x+player.w>p.x &&
player.y<p.y+p.h &&
player.y+player.h>p.y){

if(player.vy>0){
player.y=p.y-player.h
player.vy=0
player.grounded=true
}
else{
player.wall=true
}

}

}

for(let c of coins){

if(!c.collected &&
player.x<c.x+20 &&
player.x+player.w>c.x &&
player.y<c.y+20 &&
player.y+player.h>c.y){

c.collected=true
score++
document.getElementById("ui").innerText="Coins: "+score

}

}

for(let e of enemies){

e.x+=e.dir*2
if(e.x<e.start||e.x>e.end) e.dir*=-1

if(player.x<e.x+e.w &&
player.x+player.w>e.x &&
player.y<e.y+e.h &&
player.y+player.h>e.y){

respawn()

}

}

for(let l of lava){

if(player.x<l.x+l.w &&
player.x+player.w>l.x &&
player.y<l.y+l.h &&
player.y+player.h>l.y){

respawn()

}

}

for(let cp of checkpoints){

if(player.x>cp.x){
checkpointX=cp.x
}

}

cameraX=player.x-200

if(player.y>canvas.height){
respawn()
}

}

function respawn(){

player.x=checkpointX
player.y=300
player.vx=0
player.vy=0

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.save()
ctx.translate(-cameraX,0)

ctx.fillStyle="white"
for(let p of platforms){
ctx.fillRect(p.x,p.y,p.w,p.h)
}

ctx.fillStyle="gold"
for(let c of coins){
if(!c.collected)
ctx.fillRect(c.x,c.y,20,20)
}

ctx.fillStyle="red"
for(let e of enemies){
ctx.fillRect(e.x,e.y,e.w,e.h)
}

ctx.fillStyle="orange"
for(let l of lava){
ctx.fillRect(l.x,l.y,l.w,l.h)
}

ctx.fillStyle="cyan"
for(let cp of checkpoints){
ctx.fillRect(cp.x,cp.y,10,40)
}

ctx.fillStyle="lime"
ctx.fillRect(player.x,player.y,player.w,player.h)

ctx.restore()

}

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

loop()

</script>

</body>
</html>
