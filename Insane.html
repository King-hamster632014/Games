<!DOCTYPE html>
<html>
<head>
<title>INSANE HTML FPS</title>

<style>
body{margin:0;overflow:hidden;background:#000;font-family:Arial}

#menu,#settings,#gameover{
position:absolute;width:100%;height:100%;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
background:rgba(0,0,0,.9);color:white
}

button{
padding:12px 30px;
margin:5px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:6px;
background:#00ffa6
}

#settings{display:none}
#gameover{display:none}

#crosshair{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
color:white;font-size:30px
}

#ui{
position:fixed;
bottom:20px;
left:20px;
color:white
}

.bar{width:200px;height:18px;background:#333}
#healthbar{height:100%;background:#00ffa6;width:100%}

input{width:80px;text-align:center}
</style>
</head>

<body>

<div id="menu">
<h1>INSANE FPS</h1>
<button onclick="startGame()">Start</button>
<button onclick="openSettings()">Settings</button>
</div>

<div id="settings">
<h2>Keybind Settings</h2>

Move Forward <input id="k_forward" value="w"><br>
Move Back <input id="k_back" value="s"><br>
Move Left <input id="k_left" value="a"><br>
Move Right <input id="k_right" value="d"><br>
Sprint <input id="k_sprint" value="shift"><br>
Grenade <input id="k_grenade" value="g"><br>

<button onclick="saveSettings()">Save</button>
<button onclick="closeSettings()">Back</button>
</div>

<div id="gameover">
<h1 id="finalscore"></h1>
<button onclick="location.reload()">Restart</button>
</div>

<div id="crosshair">+</div>

<div id="ui">
Health
<div class="bar"><div id="healthbar"></div></div>
<div id="score">Score: 0</div>
<div id="weapon">Weapon: Pistol</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let scene,camera,renderer;
let bots=[],bullets=[],enemyBullets=[],grenades=[];
let buildings=[];
let health=100,score=0;
let keys={};

let weapon=1;

let keybinds={
forward:"w",
back:"s",
left:"a",
right:"d",
sprint:"shift",
grenade:"g"
};

function openSettings(){
menu.style.display="none";
settings.style.display="flex";
}

function closeSettings(){
settings.style.display="none";
menu.style.display="flex";
}

function saveSettings(){
keybinds.forward=k_forward.value.toLowerCase();
keybinds.back=k_back.value.toLowerCase();
keybinds.left=k_left.value.toLowerCase();
keybinds.right=k_right.value.toLowerCase();
keybinds.sprint=k_sprint.value.toLowerCase();
keybinds.grenade=k_grenade.value.toLowerCase();
closeSettings();
}

function startGame(){

menu.style.display="none";

scene=new THREE.Scene();
scene.background=new THREE.Color(0x101010);

camera=new THREE.PerspectiveCamera(
75,innerWidth/innerHeight,.1,1000
);

camera.position.y=1.7;

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,.5));

let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

/* FLOOR */

let floor=new THREE.Mesh(
new THREE.PlaneGeometry(300,300),
new THREE.MeshStandardMaterial({color:0x333333})
);

floor.rotation.x=-Math.PI/2;
scene.add(floor);

/* BUILDINGS */

for(let i=0;i<50;i++){

let h=3+Math.random()*8;

let b=new THREE.Mesh(
new THREE.BoxGeometry(4,h,4),
new THREE.MeshStandardMaterial({color:0x666666})
);

b.position.set(
Math.random()*120-60,
h/2,
Math.random()*120-60
);

scene.add(b);
buildings.push(b);
}

/* GUN MODEL */

let gun=new THREE.Group();

let body=new THREE.Mesh(
new THREE.BoxGeometry(.3,.2,1),
new THREE.MeshStandardMaterial({color:0x444})
);

let barrel=new THREE.Mesh(
new THREE.CylinderGeometry(.05,.05,.7),
new THREE.MeshStandardMaterial({color:0x222})
);

barrel.rotation.x=Math.PI/2;
barrel.position.z=-.8;

gun.add(body);
gun.add(barrel);

gun.position.set(.6,-.4,-1);

camera.add(gun);
scene.add(camera);

/* BOTS */

for(let i=0;i<10;i++) spawnBot();

document.body.requestPointerLock();

animate();

}

/* BOT */

function spawnBot(){

let bot=new THREE.Group();

let body=new THREE.Mesh(
new THREE.BoxGeometry(1,1.5,.6),
new THREE.MeshStandardMaterial({color:0xff4444})
);

let head=new THREE.Mesh(
new THREE.BoxGeometry(.6,.6,.6),
new THREE.MeshStandardMaterial({color:0xff7777})
);

head.position.y=1.1;

bot.add(body);
bot.add(head);

bot.position.set(
Math.random()*80-40,
0,
Math.random()*80-40
);

bot.cooldown=100;

scene.add(bot);
bots.push(bot);

}

/* INPUT */

addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;

if(e.key==="1"){
weapon=1;
weaponUI("Pistol");
}

if(e.key==="2"){
weapon=2;
weaponUI("Rifle");
}
});

addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false;
});

let pitch=0,yaw=0;

addEventListener("mousemove",e=>{
if(document.pointerLockElement===document.body){

yaw-=e.movementX*.002;
pitch-=e.movementY*.002;

pitch=Math.max(-1.5,Math.min(1.5,pitch));

camera.rotation.set(pitch,yaw,0);

}
});

/* SHOOT */

addEventListener("mousedown",()=>{

let speed=weapon===1?0.8:1.4;

let bullet=new THREE.Mesh(
new THREE.SphereGeometry(.08),
new THREE.MeshBasicMaterial({color:0xffff00})
);

bullet.position.copy(camera.position);

bullet.velocity=new THREE.Vector3(0,0,-1)
.applyQuaternion(camera.quaternion)
.multiplyScalar(speed);

scene.add(bullet);
bullets.push(bullet);

});

/* GRENADE */

addEventListener("keydown",e=>{

if(e.key.toLowerCase()===keybinds.grenade){

let g=new THREE.Mesh(
new THREE.SphereGeometry(.2),
new THREE.MeshBasicMaterial({color:0x00ff00})
);

g.position.copy(camera.position);

g.velocity=new THREE.Vector3(0,0,-1)
.applyQuaternion(camera.quaternion)
.multiplyScalar(.5);

g.timer=120;

scene.add(g);
grenades.push(g);

}

});

/* MOVEMENT */

function move(){

let speed=keys[keybinds.sprint]?0.25:0.12;

if(keys[keybinds.forward]) camera.translateZ(-speed);
if(keys[keybinds.back]) camera.translateZ(speed);
if(keys[keybinds.left]) camera.translateX(-speed);
if(keys[keybinds.right]) camera.translateX(speed);

}

/* BULLETS */

function updateBullets(){

bullets.forEach((b,i)=>{

b.position.add(b.velocity);

bots.forEach((bot,j)=>{

if(b.position.distanceTo(bot.position)<1){

scene.remove(bot);
bots.splice(j,1);

score++;
scoreUI();

spawnBot();

}

});

});

}

/* GRENADE LOGIC */

function updateGrenades(){

grenades.forEach((g,i)=>{

g.position.add(g.velocity);

g.timer--;

if(g.timer<=0){

bots.forEach((bot,j)=>{

if(g.position.distanceTo(bot.position)<6){

scene.remove(bot);
bots.splice(j,1);

score++;
scoreUI();

spawnBot();

}

});

scene.remove(g);
}

});

}

/* BOT AI */

function updateBots(){

bots.forEach(bot=>{

let dir=new THREE.Vector3()
.subVectors(camera.position,bot.position);

let dist=dir.length();

dir.normalize();

bot.position.add(dir.multiplyScalar(.03));

bot.lookAt(camera.position);

bot.cooldown--;

if(bot.cooldown<=0 && dist<25){

let bullet=new THREE.Mesh(
new THREE.SphereGeometry(.1),
new THREE.MeshBasicMaterial({color:0xff0000})
);

bullet.position.copy(bot.position);
bullet.velocity=dir.clone().multiplyScalar(.4);

scene.add(bullet);
enemyBullets.push(bullet);

bot.cooldown=120;

}

});

}

/* ENEMY BULLETS */

function updateEnemyBullets(){

enemyBullets.forEach(b=>{

b.position.add(b.velocity);

if(b.position.distanceTo(camera.position)<1){

health-=10;

healthbar.style.width=health+"%";

scene.remove(b);

if(health<=0){

document.exitPointerLock();

gameover.style.display="flex";

finalscore.innerText="Score: "+score;

}

}

});

}

/* UI */

function scoreUI(){
score.innerText="Score: "+score;
}

function weaponUI(name){
weapon.innerText="Weapon: "+name;
}

/* LOOP */

function animate(){

requestAnimationFrame(animate);

move();
updateBullets();
updateBots();
updateEnemyBullets();
updateGrenades();

renderer.render(scene,camera);

}

</script>
</body>
</html>
