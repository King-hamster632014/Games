<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake Game</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
        }
        #score-board {
            font-size: 24px;
            margin-bottom: 20px;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .controls {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>SNAKE</h1>
    <div id="score-board">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">Use Arrow Keys or WASD to move</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // Grid and game mechanics
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 1; // horizontal velocity
        let dy = 0; // vertical velocity
        let score = 0;
        let gameSpeed = 100; // milliseconds per frame
        let gameLoopTimeout;

        // Start the game
        main();

        function main() {
            if (hasGameEnded()) {
                alert(`Game Over! Your final score was ${score}. Click OK to restart.`);
                resetGame();
            }

            gameLoopTimeout = setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                moveSnake();
                drawSnake();
                main();
            }, gameSpeed);
        }

        // Clear the canvas every frame
        function clearCanvas() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Draw the snake
        function drawSnake() {
            snake.forEach((part, index) => {
                // Make the head a slightly different color
                ctx.fillStyle = index === 0 ? "#4CAF50" : "#8BC34A";
                ctx.strokeStyle = "#000";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        // Move snake forward
        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            // Check if snake ate the food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
            } else {
                snake.pop(); // Remove tail if it didn't eat food
            }
        }

        // Generate food at random position
        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            // Ensure food doesn't spawn on top of the snake
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        // Draw food on canvas
        function drawFood() {
            ctx.fillStyle = "#FF5722";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        // Collision detection
        function hasGameEnded() {
            // Self collision
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }

            // Wall collision
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= tileCount;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= tileCount;

            return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall;
        }

        // Reset game state
        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            food = { x: 5, y: 5 };
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.innerText = score;
        }

        // Handle keyboard inputs
        document.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            const keyPressed = event.key;
            
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            // Handle Arrow keys and WASD, while preventing reversing into yourself
            if ((keyPressed === "ArrowLeft" || keyPressed === "a") && !goingRight) {
                dx = -1;
                dy = 0;
            }
            if ((keyPressed === "ArrowUp" || keyPressed === "w") && !goingDown) {
                dx = 0;
                dy = -1;
            }
            if ((keyPressed === "ArrowRight" || keyPressed === "d") && !goingLeft) {
                dx = 1;
                dy = 0;
            }
            if ((keyPressed === "ArrowDown" || keyPressed === "s") && !goingUp) {
                dx = 0;
                dy = 1;
            }
        }
    </script>
</body>
</html>
